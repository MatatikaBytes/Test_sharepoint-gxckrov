  "description": "Sync spreadsheets data from SharePoint\n\n## Setup\n\nIn SharePoint:\n1. Identify the site you want to sync files from\n1. Identify the directory structure where the files you want to sync exist \n\nIn Meltano Cloud:\n1. Login and connect with your Microsoft account\n1. Add Tables configuration, with respect to the identified site and directory structure\n",
  "logo_url": "/assets/logos/extractors/sharepoint.png",
